name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590
        id: filter
        with:
          filters: |
            rust:
              - 'mux-compiler/**'
              - 'mux-runtime/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'clippy.toml'
              - 'scripts/run-checks.sh'
              - 'scripts/dev-cargo.sh'
              - 'infra/**'

  rust_checks:
    name: Rust Checks
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.rust == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
      LLVM_CONFIG_PATH: /usr/bin/llvm-config-22
      LLVM_SYS_221_STRICT_VERSIONING: "1"
      CC: clang-22
      CXX: clang++-22
      MUX_RUNTIME_SRC: ${{ github.workspace }}/mux-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: muxlang/mux-runtime
          ref: main
          path: mux-runtime
      - id: runtime_sha
        run: echo "sha=$(git -C mux-runtime rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/mux-lang/runtime
          key: ${{ runner.os }}-muxrt-${{ steps.runtime_sha.outputs.sha }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy, llvm-tools-preview
      - name: Install LLVM 22
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates gnupg lsb-release wget
          sudo wget --max-redirect=0 -O /usr/share/keyrings/llvm-snapshot.gpg.key https://apt.llvm.org/llvm-snapshot.gpg.key
          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg.key] https://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-22-dev clang-22 libpolly-22-dev
      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Formatting check
        run: cargo fmt -- --check
      - name: Rust checks
        run: ./scripts/run-checks.sh
      - name: Install cargo-llvm-cov
        run: command -v cargo-llvm-cov || cargo install cargo-llvm-cov --locked
      - name: Coverage
        # Re-runs the test suite under instrumentation. Integration tests shell
        # out to CARGO_BIN_EXE_mux, which llvm-cov instruments too, so codegen
        # executed in the spawned compiler is captured.
        run: cargo llvm-cov -p mux-lang --all-features --lcov --output-path lcov.info
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error
  integration_checks:
    name: Integration Checks
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.rust == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker info
        run: docker compose version
      - name: Service-backed checks
        run: ./scripts/integration-checks.sh
  sonarqube:
    name: SonarQube
    # Runs on every push and pull request (no path gating): SonarQube analyzes
    # the whole project, so it must not be skipped just because no Rust files
    # changed. `needs` + `always()` lets it still run when rust_checks is
    # path-skipped; the coverage download is best-effort in that case.
    needs: rust_checks
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-lcov
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
